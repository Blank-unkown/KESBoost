<app-sidebar menuId="main" contentId="main-content" activePage="subjects"></app-sidebar>

<ion-header class="custom-header">
  <ion-toolbar color="primary" class="header-toolbar">
    <ion-buttons slot="start">
      <ion-button fill="clear" class="menu-button" (click)="openSidebar()">
        <ion-icon name="menu" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Subjects</ion-title>
    <ion-buttons slot="end">
      <ion-back-button defaultHref="/class-list"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content id="main-content" class="subject-list-content">
  <!-- Add Subject -->
  <ion-card class="add-subject-card">
    <ion-card-header>
      <ion-card-title>Add Subject</ion-card-title>
      <ion-card-subtitle>Fill in the details and save</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <div class="form-grid">
        <ion-item class="form-item" lines="none">
          <ion-label position="stacked">Subject Name</ion-label>
          <ion-input [(ngModel)]="subjectName" placeholder="e.g. Mathematics" [disabled]="isSaving"></ion-input>
        </ion-item>

        <ion-item class="form-item" lines="none">
          <ion-label position="stacked">Code (optional)</ion-label>
          <ion-input [(ngModel)]="subjectCode" placeholder="e.g. MATH101" [disabled]="isSaving"></ion-input>
        </ion-item>

        <ion-item class="form-item" lines="none">
          <ion-label position="stacked">Total Marks</ion-label>
          <ion-input type="number" [(ngModel)]="subjectTotalMarks" placeholder="100" [disabled]="isSaving"></ion-input>
        </ion-item>

        <ion-item class="form-item span-2" lines="none">
          <ion-label position="stacked">Description (optional)</ion-label>
          <ion-textarea autoGrow="true" [(ngModel)]="subjectDescription" placeholder="Short description" [disabled]="isSaving"></ion-textarea>
        </ion-item>
      </div>

      <ion-button expand="block" class="save-btn" (click)="addSubject()" [disabled]="isSaving">
        <ion-spinner *ngIf="isSaving" name="crescent" slot="start"></ion-spinner>
        Save Subject
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Subject List -->
  <div class="subjects-list">
    <ion-card *ngFor="let sub of subjects" class="subject-card" (click)="goToTOS(sub.id)">
      <ion-card-header class="subject-card-header">
        <ion-card-title class="subject-card-title">{{ sub.name }}</ion-card-title>
        <ion-card-subtitle class="subject-card-subtitle">
          <span *ngIf="sub.code">{{ sub.code }}</span>
          <span *ngIf="sub.total_marks"> • {{ sub.total_marks }} marks</span>
          <span *ngIf="sub.student_count !== undefined"> • {{ sub.student_count }} students</span>
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content class="subject-card-content">
        <div class="subject-actions-grid">
          <ion-button class="action-btn" expand="block" fill="outline" (click)="$event.stopPropagation(); openStudents(sub)">
            <ion-icon slot="start" name="people-outline"></ion-icon>
            Students
          </ion-button>
          <ion-button class="action-btn" expand="block" fill="outline" color="tertiary" (click)="$event.stopPropagation(); goToScannedResults(sub.id)">
            <ion-icon slot="start" name="scan-outline"></ion-icon>
            Scans
          </ion-button>
          <ion-button
            class="action-btn"
            expand="block"
            fill="outline"
            color="secondary"
            (click)="$event.stopPropagation(); toggleAnalysis()"
            *ngIf="results.length > 0 && subjectId === sub.id"
          >
            <ion-icon slot="start" name="analytics-outline"></ion-icon>
            {{ showAnalysis ? 'Hide' : 'Analysis' }}
          </ion-button>
          <ion-button class="action-btn" expand="block" color="danger" (click)="$event.stopPropagation(); deleteSubject(sub.id)">
            <ion-icon slot="start" name="trash-outline"></ion-icon>
            Delete
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
   

  <!-- Per-subject scans and analysis were moved to TOS → Students view -->
</ion-content>
