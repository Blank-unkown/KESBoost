<ion-menu side="start" [menuId]="menuId" [contentId]="contentId" class="app-sidebar">
  <ion-header>
    <ion-toolbar class="app-sidebar__header">
      <div class="app-sidebar__brand">
        <div class="app-sidebar__brandMark">E</div>
        <div class="app-sidebar__brandText">
          <div class="app-sidebar__title">EduScan</div>
          <div class="app-sidebar__subtitle">Teacher Panel</div>
        </div>
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-content class="app-sidebar__content">
    <div class="app-sidebar__profile">
      <div class="app-sidebar__avatar">
        {{ currentUser?.name?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="app-sidebar__name">{{ currentUser?.name }}</div>
      <div class="app-sidebar__email">{{ currentUser?.email }}</div>
    </div>

    <ion-list class="app-sidebar__list">
      <div class="app-sidebar__section">Main</div>
      <ion-item button class="app-sidebar__item" [class.app-sidebar__item--active]="activePage === 'dashboard'" (click)="goTo('/teacher-dashboard')">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        <ion-label>Dashboard</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="app-sidebar__chevron"></ion-icon>
      </ion-item>

      <ion-item button class="app-sidebar__item" [class.app-sidebar__item--active]="activePage === 'classes'" (click)="goTo('/class-list')">
        <ion-icon name="folder-outline" slot="start"></ion-icon>
        <ion-label>My Classes</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="app-sidebar__chevron"></ion-icon>
      </ion-item>

      <ion-item button class="app-sidebar__item" [class.app-sidebar__item--active]="activePage === 'subjects'" (click)="goToSubjects()">
        <ion-icon name="book-outline" slot="start"></ion-icon>
        <ion-label>Subjects</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="app-sidebar__chevron"></ion-icon>
      </ion-item>

      <div class="app-sidebar__section">Tools</div>

      <ion-item button class="app-sidebar__item" [class.app-sidebar__item--active]="activePage === 'results'" (click)="goToResultsRoot()">
        <ion-icon name="bar-chart-outline" slot="start"></ion-icon>
        <ion-label>Results</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="app-sidebar__chevron"></ion-icon>
      </ion-item>

      <ion-item button class="app-sidebar__item" [class.app-sidebar__item--active]="activePage === 'settings'" (click)="goTo('/teacher-settings')">
        <ion-icon name="settings-outline" slot="start"></ion-icon>
        <ion-label>Settings</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="app-sidebar__chevron"></ion-icon>
      </ion-item>

      <div class="app-sidebar__divider"></div>
      <ion-item button class="app-sidebar__item app-sidebar__item--danger" (click)="logout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        <ion-label>Logout</ion-label>
        <ion-icon name="chevron-forward-outline" slot="end" class="app-sidebar__chevron"></ion-icon>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
