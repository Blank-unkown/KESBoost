<ion-header *ngIf="!embedded">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/teacher-dashboard"></ion-back-button>
    </ion-buttons>
    <ion-title>Answer Sheet Layout</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-button expand="block" color="primary" (click)="exportPDF()">
    📄 Export & Share Answer Sheet
  </ion-button>

  <ion-item lines="none">
    <ion-label position="stacked">Student</ion-label>
    <ion-select [(ngModel)]="selectedStudentId" (ionChange)="applySelectedStudent()" interface="popover">
      <ion-select-option value="all">All Students</ion-select-option>
      <ion-select-option *ngFor="let s of students" [value]="s.id">
        {{ s.name }}<ng-container *ngIf="s.roll_number"> ({{ s.roll_number }})</ng-container>
      </ion-select-option>
    </ion-select>
  </ion-item>

  <div id="answer-sheet-container">
    <!--
      OMR Answer Sheet - Optimized for OpenCV scanning
      - Sheet size: 800 x 1131 pixels (A4 aspect ratio)
      - Corner markers: 55x55 pixels (robust contour detection)
      - Bubble radius: 16 pixels, 48px spacing
      - Coordinates match bubble-template.ts
    -->
    <svg
      id="export-bubble-sheet"
      class="bubble-sheet"
      width="794"
      height="1123"
      viewBox="0 0 800 1131"
      xmlns="http://www.w3.org/2000/svg"
      style="background:#fff;"
    >
      <!-- Border (Light guide for cutting if needed) -->
      <rect x="5" y="5" width="790" height="1121" fill="none" stroke="#eee" stroke-width="1" />
      
      <!-- Professional Header -->
      <rect x="40" y="40" width="720" height="170" fill="none" stroke="black" stroke-width="2" />
      <line x1="40" y1="100" x2="760" y2="100" stroke="black" stroke-width="1" />
      
      <!-- Exam Title -->
      <text x="400" y="80" font-size="28" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">
        {{ subjectName || 'EXAMINATION ANSWER SHEET' }}
      </text>
      
      <!-- Student Information Section -->
      <g font-family="Arial, sans-serif">
        <!-- Labels -->
        <text x="60" y="135" font-size="14" font-weight="bold">NAME:</text>
        <text x="60" y="165" font-size="14" font-weight="bold">CLASS:</text>
        <text x="60" y="195" font-size="14" font-weight="bold">DATE:</text>
        
        <!-- Underlines/Fields -->
        <line x1="110" y1="140" x2="480" y2="140" stroke="black" stroke-width="1" />
        <line x1="115" y1="170" x2="300" y2="170" stroke="black" stroke-width="1" />
        <line x1="110" y1="200" x2="300" y2="200" stroke="black" stroke-width="1" />

        <!-- Dynamic Data -->
        <text x="120" y="135" font-size="18" font-weight="bold">{{ currentStudentName }}</text>
        <text x="125" y="165" font-size="16">{{ className }}</text>
        
        <!-- Roll Number Section (Right Side of Header) -->
        <line x1="500" y1="100" x2="500" y2="210" stroke="black" stroke-width="1" />
        <text x="515" y="135" font-size="14" font-weight="bold">ROLL NUMBER:</text>
        <rect x="515" y="145" width="230" height="50" fill="#fcfcfc" stroke="black" stroke-width="2" rx="3" />
        <text x="630" y="182" font-size="32" font-weight="bold" text-anchor="middle" letter-spacing="3">
          {{ currentStudentRollNumber }}
        </text>
      </g>

      <!-- Instructions Bar -->
      <rect x="40" y="220" width="720" height="30" fill="#333" rx="2" />
      <text x="400" y="240" font-size="12" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif" fill="white">
        MARKING INSTRUCTIONS: FILL CIRCLES COMPLETELY WITH HB/2B PENCIL OR BLACK PEN.
      </text>

      <!-- COLUMN HEADERS & OPTION LABELS -->
      <g font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">
        <text x="230" y="278" font-size="16">QUESTIONS 1-25</text>
        <text x="158" y="305">A</text>
        <text x="206" y="305">B</text>
        <text x="254" y="305">C</text>
        <text x="302" y="305">D</text>

        <text x="590" y="278" font-size="16">QUESTIONS 26-50</text>
        <text x="518" y="305">A</text>
        <text x="566" y="305">B</text>
        <text x="614" y="305">C</text>
        <text x="662" y="305">D</text>
      </g>

      <!-- CORNER MARKERS (55x55 for robust OpenCV contour detection) -->
      <g id="marker-tl">
        <rect x="15" y="15" width="55" height="55" fill="black" stroke="black" stroke-width="1" />
        <rect x="22" y="22" width="41" height="41" fill="white" />
        <rect x="29" y="29" width="27" height="27" fill="black" />
      </g>
      <g id="marker-tr">
        <rect x="730" y="15" width="55" height="55" fill="black" stroke="black" stroke-width="1" />
        <rect x="737" y="22" width="41" height="41" fill="white" />
        <rect x="744" y="29" width="27" height="27" fill="black" />
      </g>
      <g id="marker-bl">
        <rect x="15" y="1061" width="55" height="55" fill="black" stroke="black" stroke-width="1" />
        <rect x="22" y="1068" width="41" height="41" fill="white" />
        <rect x="29" y="1075" width="27" height="27" fill="black" />
      </g>
      <g id="marker-br">
        <rect x="730" y="1061" width="55" height="55" fill="black" stroke="black" stroke-width="1" />
        <rect x="737" y="1068" width="41" height="41" fill="white" />
        <rect x="744" y="1075" width="27" height="27" fill="black" />
      </g>

      <!-- Student Identity Code (8x8 grid) -->
      <g id="student-code" *ngIf="currentStudentName || currentStudentRollNumber">
        <ng-container *ngFor="let row of studentCodeGrid; let r = index">
          <ng-container *ngFor="let bit of row; let c = index">
            <rect
              [attr.x]="320 + c * 6"
              [attr.y]="150 + r * 6"
              [attr.width]="6"
              [attr.height]="6"
              [attr.fill]="bit ? 'black' : 'white'"
              stroke="black"
              stroke-width="0.4"
            />
          </ng-container>
        </ng-container>
      </g>

      <!-- ANSWER GRID OUTLINE (thick rectangle around all bubbles) -->
      <rect
        x="130"
        y="292"
        width="560"
        height="824"
        fill="none"
        stroke="black"
        stroke-width="2.5"
        rx="8"
      />

      <!-- BUBBLES (No letters inside for better OMR detection) -->
      <ng-container *ngFor="let b of exportBubbles">
        <!-- Question Number -->
        <text [attr.x]="b.options.A.cx - 45" [attr.y]="b.options.A.cy + 6" font-size="14" font-weight="bold" text-anchor="end" font-family="Arial, sans-serif">
          {{ b.question }}.
        </text>

        <!-- Circles Only -->
        <circle [attr.cx]="b.options.A.cx" [attr.cy]="b.options.A.cy" [attr.r]="b.options.A.radius" fill="none" stroke="black" stroke-width="1" />
        <circle [attr.cx]="b.options.B.cx" [attr.cy]="b.options.B.cy" [attr.r]="b.options.B.radius" fill="none" stroke="black" stroke-width="1" />
        <circle [attr.cx]="b.options.C.cx" [attr.cy]="b.options.C.cy" [attr.r]="b.options.C.radius" fill="none" stroke="black" stroke-width="1" />
        <circle [attr.cx]="b.options.D.cx" [attr.cy]="b.options.D.cy" [attr.r]="b.options.D.radius" fill="none" stroke="black" stroke-width="1" />
      </ng-container>

      <!-- Footer -->
      <text x="400" y="1115" font-size="10" text-anchor="middle" fill="#666">
        OMR Answer Sheet - {{ totalQuestions }} Questions | Generated by KESBoost
      </text>
    </svg>
  </div>
</ion-content>
